name: todoList
description: "A Flutter To-Do List App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: false
  image_path: 'assets/icon/logo.png'

flutter:
  uses-material-design: true

  assets:
    - 'assets/images/background.jpg'
    - 'assets/icon/logo.png'

  fonts:
    - family: PlaywriteGBJGuides
      fonts:
        - asset: 'assets/fonts/PlaywriteGBJGuides-Italic.ttf'
        - asset: 'assets/fonts/PlaywriteGBJGuides-Regular.ttf'

    - family: MomoSignature
      fonts:
        - asset: 'assets/fonts/MomoSignature-Regular.ttf'

    - family: Ubuntu
      fonts:
        - asset: 'assets/fonts/Ubuntu-Bold.ttf'
